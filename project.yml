name: Mosaic
options:
  bundleIdPrefix: com.mosaic
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  SWIFT_VERSION: "6.0"
  INFOPLIST_FILE: Mosaic/Info.plist
  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
targets:
  Mosaic:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - Mosaic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mosaic.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Mosaic/Info.plist
        PRODUCT_NAME: Mosaic
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Mosaic/Mosaic.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Mosaic/Mosaic.entitlements
