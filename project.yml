name: Mosaic
options:
  bundleIdPrefix: com.mosaic
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
settings:
  SWIFT_VERSION: "5.9"
  TARGETED_DEVICE_FAMILY: "1,2"
  INFOPLIST_FILE: Mosaic/Info.plist
  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
targets:
  Mosaic:
    type: application
    platform: iOS
    sources:
      - Mosaic
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.mosaic.app
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: 1
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
      INFOPLIST_FILE: Mosaic/Info.plist
